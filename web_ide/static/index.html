<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AION Web IDE</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .header {
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            color: #00d4ff;
            letter-spacing: 3px;
        }

        .logo span {
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: 400;
            margin-left: 10px;
            opacity: 0.5;
        }

        .header-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* ── Main layout ── */
        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 200px;
            background: #141424;
            border-right: 1px solid #2a2a4a;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-title {
            padding: 12px 16px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #555;
            border-bottom: 1px solid #2a2a4a;
        }

        .example-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #888;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .example-item:hover {
            background: #1a1a2e;
            color: #00d4ff;
            border-left-color: #00d4ff;
        }

        /* ── Editor area ── */
        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Toolbar ── */
        .toolbar {
            background: #1a1a2e;
            border-bottom: 1px solid #2a2a4a;
            padding: 8px 16px;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        .btn {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.15s;
        }

        .btn-run {
            background: linear-gradient(135deg, #00d4ff, #0088cc);
            color: white;
        }

        .btn-run:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn-run:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-clear {
            background: #2a2a4a;
            color: #888;
        }

        .btn-clear:hover { background: #3a3a5a; color: #fff; }

        .btn-copy {
            background: #2a2a4a;
            color: #888;
        }

        .btn-copy:hover { background: #3a3a5a; color: #fff; }

        .toolbar-info {
            margin-left: auto;
            font-size: 0.75rem;
            color: #444;
        }

        /* ── Editor + Output split ── */
        .split {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Code Editor ── */
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a2a4a;
        }

        .editor-label {
            padding: 6px 16px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            background: #141424;
            border-bottom: 1px solid #2a2a4a;
        }

        #editor {
            flex: 1;
            background: #0d0d1a;
            color: #e0e0e0;
            border: none;
            outline: none;
            padding: 20px;
            font-family: 'Cascadia Code', 'Fira Code',
                         'Consolas', monospace;
            font-size: 14px;
            line-height: 1.7;
            resize: none;
            tab-size: 4;
            white-space: pre;
            overflow-wrap: normal;
            overflow-x: auto;
        }

        #editor::placeholder { color: #333; }

        /* ── Output Panel ── */
        .output-container {
            width: 380px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .output-label {
            padding: 6px 16px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            background: #141424;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #output {
            flex: 1;
            padding: 20px;
            font-family: 'Cascadia Code', 'Fira Code',
                         'Consolas', monospace;
            font-size: 13px;
            line-height: 1.7;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #00ff88;
        }

        .output-error { color: #ff6b6b; }
        .output-info  { color: #00d4ff; }
        .output-dim   { color: #444; }

        /* ── Status bar ── */
        .statusbar {
            background: #00d4ff;
            color: #000;
            padding: 3px 16px;
            font-size: 0.7rem;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* ── Loading spinner ── */
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid #ffffff40;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0d0d1a; }
        ::-webkit-scrollbar-thumb {
            background: #2a2a4a;
            border-radius: 3px;
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="logo">
        AION
        <span>AI-Native Programming Language</span>
    </div>
    <div class="header-right">
        <span style="font-size:0.75rem;color:#444"
              id="version-label">v0.1.0</span>
    </div>
</div>

<!-- Main -->
<div class="main">

    <!-- Sidebar: Examples -->
    <div class="sidebar">
        <div class="sidebar-title">Examples</div>
        <div id="examples-list"></div>
    </div>

    <!-- Editor Area -->
    <div class="editor-area">

        <!-- Toolbar -->
        <div class="toolbar">
            <button class="btn btn-run"
                    id="run-btn"
                    onclick="runCode()">
                ▶ Run
            </button>
            <button class="btn btn-clear"
                    onclick="clearOutput()">
                Clear
            </button>
            <button class="btn btn-copy"
                    onclick="copyCode()">
                Copy
            </button>
            <span class="toolbar-info"
                  id="toolbar-info">
                Ready
            </span>
        </div>

        <!-- Editor + Output -->
        <div class="split">

            <!-- Code Editor -->
            <div class="editor-container">
                <div class="editor-label">
                    editor — main.aion
                </div>
                <textarea id="editor"
                    placeholder="# Write AION code here...
name = &quot;Emmanuel&quot;
show &quot;Hello {name}!&quot;"
                    spellcheck="false"
                    autocorrect="off"
                    autocapitalize="off"
                ></textarea>
            </div>

            <!-- Output Panel -->
            <div class="output-container">
                <div class="output-label">
                    <span>Output</span>
                    <span id="exec-time"
                          style="color:#444"></span>
                </div>
                <div id="output">
                    <span class="output-dim"
                    >// Press ▶ Run to execute your code
// Ctrl+Enter to run quickly
</span>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- Status Bar -->
<div class="statusbar">
    <span>AION Web IDE</span>
    <span id="status-right">Ready</span>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
let isRunning = false;

// ── Run code ──────────────────────────────────────────────────
async function runCode() {
    if (isRunning) return;

    const code = document.getElementById('editor').value;
    if (!code.trim()) return;

    isRunning = true;
    setRunning(true);
    clearOutput();

    appendOutput('// Running...', 'output-dim');

    try {
        const res = await fetch('/api/run', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ code })
        });

        const data = await res.json();

        clearOutput();

        if (data.error) {
            appendOutput('✗ Error:', 'output-error');
            appendOutput(data.error, 'output-error');
        } else if (data.output) {
            appendOutput(data.output, '');
        } else {
            appendOutput('// No output', 'output-dim');
        }

        // Show execution time
        if (data.time) {
            document.getElementById('exec-time')
                .textContent = `${data.time}ms`;
        }

        setStatus(`Done in ${data.time}ms`);

    } catch (err) {
        clearOutput();
        appendOutput('✗ Connection error: ' + err.message,
                     'output-error');
        appendOutput('Make sure the AION server is running.',
                     'output-dim');
    }

    isRunning = false;
    setRunning(false);
}

// ── Output helpers ────────────────────────────────────────────
function appendOutput(text, cls) {
    const out  = document.getElementById('output');
    const span = document.createElement('span');
    if (cls) span.className = cls;
    span.textContent = text;
    out.appendChild(span);
    out.scrollTop = out.scrollHeight;
}

function clearOutput() {
    document.getElementById('output').innerHTML = '';
    document.getElementById('exec-time').textContent = '';
}

// ── UI helpers ────────────────────────────────────────────────
function setRunning(running) {
    const btn  = document.getElementById('run-btn');
    const info = document.getElementById('toolbar-info');

    if (running) {
        btn.disabled   = true;
        btn.innerHTML  =
            '<span class="spinner"></span>Running...';
        info.textContent = 'Executing...';
    } else {
        btn.disabled   = false;
        btn.innerHTML  = '▶ Run';
        info.textContent = 'Ready';
    }
}

function setStatus(msg) {
    document.getElementById('status-right')
        .textContent = msg;
}

function copyCode() {
    const code = document.getElementById('editor').value;
    navigator.clipboard.writeText(code).then(() => {
        setStatus('Copied to clipboard!');
        setTimeout(() => setStatus('Ready'), 2000);
    });
}

// ── Examples ──────────────────────────────────────────────────
async function loadExamples() {
    try {
        const res  = await fetch('/api/examples');
        const data = await res.json();
        const list = document.getElementById('examples-list');

        data.examples.forEach(ex => {
            const div = document.createElement('div');
            div.className   = 'example-item';
            div.textContent = ex.name;
            div.onclick     = () => loadExample(ex);
            list.appendChild(div);
        });
    } catch (e) {
        console.error('Could not load examples:', e);
    }
}

function loadExample(ex) {
    document.getElementById('editor').value = ex.code;
    clearOutput();
    setStatus(`Loaded: ${ex.name}`);
}

// ── Keyboard shortcuts ────────────────────────────────────────
document.addEventListener('keydown', e => {
    // Ctrl+Enter or Cmd+Enter to run
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        runCode();
    }

    // Tab key in editor — insert 4 spaces
    if (e.key === 'Tab' &&
        e.target.id === 'editor') {
        e.preventDefault();
        const ta    = e.target;
        const start = ta.selectionStart;
        const end   = ta.selectionEnd;
        ta.value    = ta.value.substring(0, start) +
                      '    ' +
                      ta.value.substring(end);
        ta.selectionStart = ta.selectionEnd = start + 4;
    }
});

// ── Version ───────────────────────────────────────────────────
async function loadVersion() {
    try {
        const res  = await fetch('/api/version');
        const data = await res.json();
        document.getElementById('version-label')
            .textContent = `v${data.version} · ${data.codename}`;
    } catch (e) {}
}

// ── Init ──────────────────────────────────────────────────────
loadExamples();
loadVersion();

// Load a starter example
setTimeout(() => {
    loadExample({
        name: "Hello World",
        code: `name = "Emmanuel"\nage = 20\n\nshow "Welcome to AION Web IDE!"\nshow "Hello {name}!"\nshow "Age: {age}"\n\nif age >= 18:\n    show "You are an adult"\n\nrepeat 3:\n    show "AION is awesome!"`
    });
}, 100);
</script>
</body>
</html>
